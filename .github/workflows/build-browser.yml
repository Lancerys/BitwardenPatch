name: Build Browser

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - ".github/workflows/build-android.yml"
  schedule:
    # Every Sunday 12:00 UTC
    - cron: "0 12 * * 0"

permissions:
  contents: write

concurrency:
  group: build-browser-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-22.04
    outputs:
      latest_browser_tag: ${{ steps.gen_vars.outputs.latest_browser_tag }}
      node_version: ${{ steps.retrieve-node-version.outputs.node_version }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Clone upstream clients repo
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/bitwarden/clients.git

      - name: Get latest browser tag
        id: gen_vars
        working-directory: clients
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_browser_tag="$(git tag --sort=-creatordate | grep 'browser' | head -n 1 || true)"

          if [[ -z "${latest_browser_tag}" ]]; then
            echo "Failed to find latest browser tag matching 'browser'."
            exit 1
          fi

          echo "latest_browser_tag=${latest_browser_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved latest_browser_tag=${latest_browser_tag}"

      - name: Get Node version
        id: retrieve-node-version
        working-directory: clients
        run: |
          set -euo pipefail

          test -f .nvmrc || { echo ".nvmrc not found"; exit 1; }

          NODE_NVMRC="$(cat .nvmrc)"
          NODE_VERSION="${NODE_NVMRC#v}"

          if [[ -z "${NODE_VERSION}" ]]; then
            echo "Failed to resolve node version from .nvmrc"
            exit 1
          fi

          echo "node_version=${NODE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved node_version=${NODE_VERSION}"

  locales-test:
    name: Locales Test
    runs-on: ubuntu-22.04
    needs:
      - setup
    env:
      LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Clone upstream clients repo
        run: |
          set -euo pipefail
          git clone https://github.com/bitwarden/clients.git

      - name: Checkout target tag
        working-directory: clients
        run: |
          set -euo pipefail

          git fetch --tags --force
          echo "Checking out ${LATEST_BROWSER_TAG}"
          git checkout "${LATEST_BROWSER_TAG}"

      - name: Test locales extName length
        working-directory: clients/apps/browser
        run: |
          set -euo pipefail

          found_error=false

          echo "Locales Test"
          echo "============"
          echo "extName string must be 40 characters or less"
          echo

          for locale in $(ls src/_locales/); do
            string_length=$(jq '.extName.message | length' "src/_locales/$locale/messages.json")
            if [[ "${string_length}" -gt 40 ]]; then
              echo "${locale}: ${string_length}"
              found_error=true
            fi
          done

          if [[ "${found_error}" == "true" ]]; then
            echo
            echo "Please fix 'extName' for the locales listed above."
            # exit 1
          else
            echo "Test passed!"
          fi

  build-source:
    name: Build browser source
    runs-on: ubuntu-22.04
    needs:
      - setup
    env:
      LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Clone upstream clients repo
        run: |
          set -euo pipefail
          git clone https://github.com/bitwarden/clients.git

      - name: Checkout target tag
        working-directory: clients
        run: |
          set -euo pipefail

          git fetch --tags --force
          echo "Checking out ${LATEST_BROWSER_TAG}"
          git checkout "${LATEST_BROWSER_TAG}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: clients/package-lock.json
          node-version: ${{ env.NODE_VERSION }}

      - name: Print environment
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Apply internal patch
        working-directory: clients
        run: |
          set -euo pipefail

          test -f ../patches/browser/hasPremiumPersonally.patch || { echo "Patch file not found"; exit 1; }

          cp ../patches/browser/hasPremiumPersonally.patch ./hasPremiumPersonally.patch
          git apply --check hasPremiumPersonally.patch
          git apply -v hasPremiumPersonally.patch

      - name: Build sources for reviewers
        working-directory: clients
        run: |
          set -euo pipefail

          shopt -s dotglob

          rm -rf .git
          rm -rf browser-source browser-source.zip

          mkdir -p browser-source

          while IFS= read -r -d '' file; do
            cp "$file" browser-source/
          done < <(find . -maxdepth 1 -type f -print0)

          mkdir -p browser-source/apps/browser
          cp -r apps/browser/* browser-source/apps/browser

          mkdir -p browser-source/libs
          cp -r libs/* browser-source/libs

          zip -r browser-source.zip browser-source

      - name: Upload browser source
        uses: actions/upload-artifact@v4
        with:
          name: browser-source-${{ env.LATEST_BROWSER_TAG }}.zip
          path: clients/browser-source.zip
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-22.04
    needs:
      - setup
      - build-source
    env:
      LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: chrome
            npm_command: dist:chrome
            archive_name: dist-chrome.zip
            artifact_name: dist-chrome-MV3
          - name: edge
            npm_command: dist:edge
            archive_name: dist-edge.zip
            artifact_name: dist-edge-MV3
          - name: firefox
            npm_command: dist:firefox
            archive_name: dist-firefox.zip
            artifact_name: dist-firefox
          - name: opera-mv3
            npm_command: dist:opera:mv3
            archive_name: dist-opera.zip
            artifact_name: dist-opera-MV3

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download browser source
        uses: actions/download-artifact@v4
        with:
          name: browser-source-${{ env.LATEST_BROWSER_TAG }}.zip

      - name: Unzip browser source artifact
        run: |
          set -euo pipefail
          unzip browser-source.zip
          rm -f browser-source.zip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: browser-source/package-lock.json
          node-version: ${{ env.NODE_VERSION }}

      - name: Print environment
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: NPM setup
        working-directory: browser-source
        run: |
          set -euo pipefail
          npm ci

      - name: Check source file size
        if: ${{ startsWith(matrix.name, 'firefox') }}
        run: |
          set -euo pipefail

          declare -a FILES
          TARGET_DIR="./browser-source/apps/browser"

          while IFS= read -r RESULT; do
            FILES+=("$RESULT")
          done < <(find "$TARGET_DIR" -size +5M)

          if [[ ${#FILES[@]} -ne 0 ]]; then
            echo "File(s) exceed size limit: 5MB"
            for FILE in "${FILES[@]}"; do
              du --si "$FILE"
            done
            echo "ERROR Firefox rejects extension uploads that contain files larger than 5MB"
            # exit 1
          fi

      - name: Build extension
        working-directory: browser-source/apps/browser
        run: |
          set -euo pipefail
          npm run "${{ matrix.npm_command }}"

      - name: Verify build output
        run: |
          set -euo pipefail

          test -f "browser-source/apps/browser/dist/${{ matrix.archive_name }}" || {
            echo "Expected archive not found: browser-source/apps/browser/dist/${{ matrix.archive_name }}"
            exit 1
          }

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.LATEST_BROWSER_TAG }}.zip
          path: browser-source/apps/browser/dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs:
      - setup
      - build-source
      - build
    env:
      LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}

    steps:
      - name: Create artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Verify artifacts
        run: |
          set -euo pipefail
          ls -lah artifacts
          compgen -G "artifacts/*" > /dev/null || { echo "No artifacts found"; exit 1; }

      - name: Create release
        uses: ncipollo/release-action@v1
        continue-on-error: true
        with:
          artifacts: artifacts/*
          tag: ${{ env.LATEST_BROWSER_TAG }}
          name: ${{ env.LATEST_BROWSER_TAG }}
          body: ${{ env.LATEST_BROWSER_TAG }} [Original Changelog](https://github.com/bitwarden/clients/releases/tag/${{ env.LATEST_BROWSER_TAG }})
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          allowUpdates: false
          makeLatest: true
